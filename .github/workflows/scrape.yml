name: Scrape Lottery Results

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      dates:
        description: "Optional dates to scrape, separated by spaces. Example: 15-05-2026 14-05-2026 13-05-2026"
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper contract tests
        run: python -m unittest discover -s scraper -p "*_test.py"

      - name: Check Supabase secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY || secrets.SUPABASE_KEY }}
        run: |
          test -n "$SUPABASE_URL" || (echo "SUPABASE_URL secret is missing" && exit 1)
          test -n "$SUPABASE_KEY" || (echo "Supabase publishable/anon key secret is missing" && exit 1)
          echo "Supabase secrets are configured"

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY || secrets.SUPABASE_KEY }}
          SCRAPE_DATES: ${{ inputs.dates }}
        run: |
          if [ -n "$SCRAPE_DATES" ]; then
            python scraper/scrape_and_save.py $SCRAPE_DATES
          else
            python scraper/scrape_and_save.py
          fi

      - name: Check Render results API health
        env:
          RESULTS_RENDER_URL: ${{ secrets.RESULTS_RENDER_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          base_url = os.environ.get("RESULTS_RENDER_URL", "https://didactic-guacamole.onrender.com").rstrip("/")
          url = f"{base_url}/system-results?mode=both"
          with urllib.request.urlopen(url, timeout=20) as response:
              payload = json.loads(response.read().decode("utf-8"))
          lotteries = int(payload.get("lotteries", {}).get("count", 0))
          picks = int(payload.get("picks", {}).get("count", 0))
          source = payload.get("source")
          print(json.dumps({
              "url": url,
              "source": source,
              "lotteries": lotteries,
              "picks": picks,
          }, indent=2))
          if source == "live-scraper":
              print("Render API should be cache-first for scheduled health checks", file=sys.stderr)
              sys.exit(1)
          if lotteries <= 0 and picks <= 0:
              print("Render API returned no results after scraper run", file=sys.stderr)
              sys.exit(1)
          PY
