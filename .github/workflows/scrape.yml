name: Scrape Lottery Results

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      dates:
        description: "Optional dates to scrape, separated by spaces. Example: 15-05-2026 14-05-2026 13-05-2026"
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper contract tests
        run: python -m unittest discover -s scraper -p "*_test.py"

      - name: Check Supabase secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_KEY }}
        run: |
          test -n "$SUPABASE_URL" || (echo "SUPABASE_URL secret is missing" && exit 1)
          test -n "$SUPABASE_KEY" || (echo "Supabase service role key secret is missing" && exit 1)
          case "$SUPABASE_KEY" in
            sb_publishable_*|sb_anon_*) echo "Use SUPABASE_SERVICE_ROLE_KEY for scheduled writes, not a public client key" && exit 1 ;;
          esac
          python - <<'PY'
          import base64, json, os, sys
          key = os.environ["SUPABASE_KEY"].strip()
          if key.startswith("sb_secret_"):
              sys.exit(0)
          if key.count(".") >= 2:
              payload = key.split(".")[1]
              payload += "=" * (-len(payload) % 4)
              try:
                  claims = json.loads(base64.urlsafe_b64decode(payload.encode()))
              except Exception:
                  claims = {}
              if claims.get("role") == "service_role":
                  sys.exit(0)
          print("Supabase key for scheduled writes must be service_role, not anon/publishable")
          sys.exit(1)
          PY
          echo "Supabase secrets are configured"

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_KEY }}
          SCRAPE_DATES: ${{ inputs.dates }}
        run: |
          if [ -n "$SCRAPE_DATES" ]; then
            python scraper/scrape_and_save.py $SCRAPE_DATES
          else
            python scraper/scrape_and_save.py
          fi
